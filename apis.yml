aid: polestar-cars
name: Polestar
description: >-
  Polestar is a Swedish premium electric performance car brand, originally
  spun out of Volvo Cars' Polestar Performance racing arm and now jointly
  owned by Volvo Cars and Zhejiang Geely Holding Group. Headquartered in
  Gothenburg, Sweden and publicly listed on Nasdaq (ticker PSNY) since 2022,
  Polestar designs and sells a lineup of battery-electric vehicles — Polestar
  1 (discontinued hybrid GT), Polestar 2 (fastback), Polestar 3 (SUV
  manufactured in South Carolina and Chengdu), Polestar 4 (SUV coupe), and
  the upcoming Polestar 5 GT. The vehicles run a Google Automotive
  Services–based infotainment platform with Google built-in (Maps, Assistant,
  Play Store), and support NACS-compatible DC fast charging in North
  America. Polestar emphasizes sustainability through the Polestar 0 project
  (climate-neutral car by 2030) and partnerships with Circulor for battery
  traceability. Polestar does not currently publish or document a public
  developer API, SDK, OEM connected-car API, or partner integration
  programme; all known third-party Polestar integrations (Home Assistant,
  community Python clients) rely on reverse-engineering the unauthenticated
  customer app endpoints and are explicitly unsupported by Polestar.
